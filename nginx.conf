server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/ttf font/otf font/woff font/woff2;

    # Long-cache hashed assets emitted by Astro
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fonts
    location ~* \.(woff2?|ttf|otf|eot)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — never cache, so deploys roll out immediately
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ $uri.html /index.html;
    }
}
